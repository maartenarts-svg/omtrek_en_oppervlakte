<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oefenen - Wiskunde Leerplatform</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="header-left">
            <a href="overview.html" class="logo">📐 Wiskunde</a>
            <nav class="nav-menu">
                <a href="overview.html">Lessen</a>
                <a href="theory.html">Theorie</a>
                <a href="drill.html" class="active">Oefenen</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="xp-display">
                <span class="xp-icon">⭐</span>
                <span class="xp-amount" id="totalXP">0</span>
                <span>XP</span>
            </div>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">?</div>
                <span class="user-name">Leerling</span>
            </div>
            <button class="btn btn-secondary btn-small" onclick="logout()">Uitloggen</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="content-section">
            <h1>💪 Oefenen</h1>
            <p class="text-muted">Oefen formules en eenheden tot je ze perfect kent!</p>
            
            <!-- Mode Selector -->
            <div class="drill-mode-selector">
                <button class="drill-mode-btn active" data-mode="formulas" onclick="switchDrillMode('formulas')">
                    📝 Formules Inprenten
                </button>
                <button class="drill-mode-btn" data-mode="units" onclick="switchDrillMode('units')">
                    📏 Eenheden Omzetten
                </button>
            </div>

            <!-- Stats -->
            <div class="drill-stats">
                <div class="drill-stat">
                    <span class="drill-stat-label">Vandaag geoefend:</span>
                    <span class="drill-stat-value" id="todayCount">0</span>
                </div>
                <div class="drill-stat">
                    <span class="drill-stat-label">Totaal deze week:</span>
                    <span class="drill-stat-value" id="weekCount">0</span>
                </div>
            </div>

            <!-- FORMULAS MODE -->
            <div id="formulasMode" class="drill-content active">
                <div class="drill-card">
                    <div id="formulaQuestion" class="drill-question">
                        <!-- Wordt via JS ingevuld -->
                    </div>
                    
                    <div class="drill-input-area">
                        <input type="text" 
                               id="formulaInput" 
                               class="drill-input" 
                               placeholder="Typ de formule..."
                               autocomplete="off">
                        <button class="btn btn-primary" onclick="checkFormulaAnswer()">
                            Controleren
                        </button>
                    </div>
                    
                    <div id="formulaFeedback" class="drill-feedback hidden">
                        <!-- Feedback komt hier -->
                    </div>
                </div>
                
                <div class="drill-progress">
                    <div class="progress-label">Voortgang:</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="formulaProgress" style="width: 0%"></div>
                    </div>
                    <div class="progress-text">
                        <span id="formulasMastered">0</span> / <span id="formulasTotal">0</span> gekend
                    </div>
                </div>
            </div>

            <!-- UNITS MODE -->
            <div id="unitsMode" class="drill-content hidden">
                <div class="drill-card">
                    <div id="unitQuestion" class="drill-question">
                        <!-- Wordt via JS ingevuld -->
                    </div>
                    
                    <div class="drill-input-area">
                        <input type="number" 
                               id="unitInput" 
                               class="drill-input" 
                               placeholder="Typ het antwoord..."
                               step="any"
                               autocomplete="off">
                        <button class="btn btn-primary" onclick="checkUnitAnswer()">
                            Controleren
                        </button>
                    </div>
                    
                    <div id="unitFeedback" class="drill-feedback hidden">
                        <!-- Feedback komt hier -->
                    </div>
                </div>
                
                <div class="drill-progress">
                    <div class="progress-label">Voortgang:</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="unitProgress" style="width: 0%"></div>
                    </div>
                    <div class="progress-text">
                        <span id="unitsCorrect">0</span> / <span id="unitsTotal">10</span> correct
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- App Scripts -->
    <script src="../js/firebase-config.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    
    <script>
        let userData = null;
        let currentUser = null;
        let currentMode = 'formulas';
        
        // Formulas drill state
        let formulas = [
            { question: 'Omtrek van een rechthoek', answer: 'O=2l+2b', alternatives: ['O=2*l+2*b', 'O=2b+2l'] },
            { question: 'Omtrek van een vierkant', answer: 'O=4z', alternatives: ['O=4*z'] },
            { question: 'Omtrek van een cirkel', answer: 'O=2πr', alternatives: ['O=2*π*r', 'O=πd', 'O=π*d'] },
            { question: 'Oppervlakte van een rechthoek', answer: 'A=l×b', alternatives: ['A=l*b', 'A=b×l', 'A=b*l'] },
            { question: 'Oppervlakte van een vierkant', answer: 'A=z²', alternatives: ['A=z*z', 'A=z×z'] },
            { question: 'Oppervlakte van een cirkel', answer: 'A=πr²', alternatives: ['A=π*r²', 'A=π*r*r'] },
            { question: 'Oppervlakte van een driehoek', answer: 'A=(b×h)/2', alternatives: ['A=(b*h)/2', 'A=b×h/2', 'A=b*h/2'] }
        ];
        let remainingFormulas = [];
        let masteredFormulas = [];
        let currentFormula = null;
        
        // Units drill state
        let unitQuestions = [];
        let currentUnitQuestion = null;
        let unitsCorrect = 0;
        let unitsTotal = 10;

        async function initDrill() {
            currentUser = checkAuth();
            if (!currentUser) return;

            const initials = currentUser.name.split(' ').map(n => n[0]).join('').toUpperCase();
            document.getElementById('userAvatar').textContent = initials;

            userData = await DB.getUser(currentUser.email);
            if (!userData) return;

            document.getElementById('totalXP').textContent = userData.totalXP || 0;

            // Initialize formulas
            resetFormulas();
            showNextFormula();
            
            // Setup enter key
            document.getElementById('formulaInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkFormulaAnswer();
            });
            document.getElementById('unitInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkUnitAnswer();
            });
        }

        function switchDrillMode(mode) {
            currentMode = mode;
            
            // Update buttons
            document.querySelectorAll('.drill-mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
            
            // Update content
            document.querySelectorAll('.drill-content').forEach(content => {
                content.classList.remove('active');
                content.classList.add('hidden');
            });
            
            if (mode === 'formulas') {
                document.getElementById('formulasMode').classList.remove('hidden');
                document.getElementById('formulasMode').classList.add('active');
                showNextFormula();
            } else {
                document.getElementById('unitsMode').classList.remove('hidden');
                document.getElementById('unitsMode').classList.add('active');
                generateUnitQuestion();
            }
        }

        // ============================================
        // FORMULAS MODE
        // ============================================

        function resetFormulas() {
            remainingFormulas = [...formulas];
            masteredFormulas = [];
            updateFormulaProgress();
        }

        function showNextFormula() {
            if (remainingFormulas.length === 0) {
                // All mastered!
                document.getElementById('formulaQuestion').innerHTML = `
                    <div class="success-message">
                        <h2>🎉 Perfect!</h2>
                        <p>Je kent alle formules!</p>
                        <button class="btn btn-primary" onclick="resetFormulas(); showNextFormula();">
                            Opnieuw oefenen
                        </button>
                    </div>
                `;
                document.querySelector('.drill-input-area').style.display = 'none';
                return;
            }
            
            document.querySelector('.drill-input-area').style.display = 'flex';
            
            // Pick random formula
            const randomIndex = Math.floor(Math.random() * remainingFormulas.length);
            currentFormula = remainingFormulas[randomIndex];
            
            document.getElementById('formulaQuestion').innerHTML = `
                <h3>Wat is de formule voor:</h3>
                <p class="formula-prompt">${currentFormula.question}</p>
            `;
            
            document.getElementById('formulaInput').value = '';
            document.getElementById('formulaFeedback').classList.add('hidden');
            document.getElementById('formulaInput').focus();
        }

        function checkFormulaAnswer() {
            const userAnswer = document.getElementById('formulaInput').value.trim().replace(/\s/g, '');
            const feedback = document.getElementById('formulaFeedback');
            
            const correctAnswers = [currentFormula.answer, ...currentFormula.alternatives].map(a => 
                a.replace(/\s/g, '').toLowerCase()
            );
            
            if (correctAnswers.includes(userAnswer.toLowerCase())) {
                // Correct!
                feedback.className = 'drill-feedback success';
                feedback.innerHTML = '✅ Correct!';
                feedback.classList.remove('hidden');
                
                // Remove from remaining
                remainingFormulas = remainingFormulas.filter(f => f !== currentFormula);
                masteredFormulas.push(currentFormula);
                updateFormulaProgress();
                
                // Next question after delay
                setTimeout(() => {
                    showNextFormula();
                }, 1000);
                
            } else {
                // Wrong
                feedback.className = 'drill-feedback error';
                feedback.innerHTML = `
                    ❌ Niet correct. Het juiste antwoord is: <strong>${currentFormula.answer}</strong><br>
                    <small>Let op: geen spaties, gebruik × of * voor vermenigvuldigen</small>
                `;
                feedback.classList.remove('hidden');
                
                // Keep in remaining (will come back)
            }
        }

        function updateFormulaProgress() {
            const progress = (masteredFormulas.length / formulas.length) * 100;
            document.getElementById('formulaProgress').style.width = progress + '%';
            document.getElementById('formulasMastered').textContent = masteredFormulas.length;
            document.getElementById('formulasTotal').textContent = formulas.length;
        }

        // ============================================
        // UNITS MODE
        // ============================================

        function generateUnitQuestion() {
            const conversions = [
                { from: 'km', to: 'm', factor: 1000 },
                { from: 'm', to: 'km', factor: 0.001 },
                { from: 'm', to: 'cm', factor: 100 },
                { from: 'cm', to: 'm', factor: 0.01 },
                { from: 'm', to: 'mm', factor: 1000 },
                { from: 'mm', to: 'm', factor: 0.001 },
                { from: 'cm', to: 'mm', factor: 10 },
                { from: 'mm', to: 'cm', factor: 0.1 },
                { from: 'dm', to: 'cm', factor: 10 },
                { from: 'cm', to: 'dm', factor: 0.1 }
            ];
            
            const conversion = conversions[Math.floor(Math.random() * conversions.length)];
            const value = Math.random() < 0.5 ? 
                Math.floor(Math.random() * 100) + 1 : 
                (Math.random() * 10).toFixed(1);
            
            currentUnitQuestion = {
                value: parseFloat(value),
                from: conversion.from,
                to: conversion.to,
                answer: parseFloat(value) * conversion.factor
            };
            
            document.getElementById('unitQuestion').innerHTML = `
                <h3>Zet om:</h3>
                <p class="formula-prompt">${currentUnitQuestion.value} ${currentUnitQuestion.from} = ? ${currentUnitQuestion.to}</p>
            `;
            
            document.getElementById('unitInput').value = '';
            document.getElementById('unitFeedback').classList.add('hidden');
            document.getElementById('unitInput').focus();
        }

        function checkUnitAnswer() {
            const userAnswer = parseFloat(document.getElementById('unitInput').value);
            const feedback = document.getElementById('unitFeedback');
            
            // Allow small floating point errors
            const tolerance = 0.01;
            const isCorrect = Math.abs(userAnswer - currentUnitQuestion.answer) < tolerance;
            
            if (isCorrect) {
                feedback.className = 'drill-feedback success';
                feedback.innerHTML = '✅ Correct!';
                feedback.classList.remove('hidden');
                
                unitsCorrect++;
                updateUnitProgress();
                
                if (unitsCorrect >= unitsTotal) {
                    // Completed!
                    setTimeout(() => {
                        feedback.innerHTML = `
                            🎉 Perfect! Je hebt ${unitsTotal} omzettingen correct gedaan!<br>
                            <button class="btn btn-primary" onclick="resetUnits()">Opnieuw oefenen</button>
                        `;
                    }, 1000);
                } else {
                    setTimeout(() => {
                        generateUnitQuestion();
                    }, 1000);
                }
                
            } else {
                feedback.className = 'drill-feedback error';
                feedback.innerHTML = `
                    ❌ Niet correct. Het juiste antwoord is: <strong>${currentUnitQuestion.answer} ${currentUnitQuestion.to}</strong>
                `;
                feedback.classList.remove('hidden');
            }
        }

        function updateUnitProgress() {
            const progress = (unitsCorrect / unitsTotal) * 100;
            document.getElementById('unitProgress').style.width = progress + '%';
            document.getElementById('unitsCorrect').textContent = unitsCorrect;
        }

        function resetUnits() {
            unitsCorrect = 0;
            updateUnitProgress();
            generateUnitQuestion();
        }

        document.addEventListener('DOMContentLoaded', initDrill);
    </script>

    <style>
        .drill-mode-selector {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .drill-mode-btn {
            flex: 1;
            padding: var(--spacing-md) var(--spacing-lg);
            border: 2px solid var(--color-gray);
            background: white;
            border-radius: var(--radius-lg);
            font-size: var(--font-size-large);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-normal);
        }

        .drill-mode-btn:hover {
            border-color: var(--color-primary);
            transform: translateY(-2px);
        }

        .drill-mode-btn.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .drill-stats {
            display: flex;
            gap: var(--spacing-xl);
            padding: var(--spacing-lg);
            background: var(--color-light);
            border-radius: var(--radius-lg);
            margin-bottom: var(--spacing-xl);
        }

        .drill-stat {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }

        .drill-stat-label {
            font-size: var(--font-size-small);
            color: #666;
        }

        .drill-stat-value {
            font-size: var(--font-size-h2);
            font-weight: 700;
            color: var(--color-primary);
        }

        .drill-content {
            display: none;
        }

        .drill-content.active {
            display: block;
        }

        .drill-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: var(--spacing-xxl);
            box-shadow: var(--shadow-md);
            margin-bottom: var(--spacing-xl);
        }

        .drill-question {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }

        .formula-prompt {
            font-size: var(--font-size-h2);
            font-weight: 600;
            color: var(--color-primary);
            margin-top: var(--spacing-lg);
        }

        .drill-input-area {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }

        .drill-input {
            flex: 1;
            padding: var(--spacing-md) var(--spacing-lg);
            font-size: var(--font-size-large);
            border: 2px solid var(--color-gray);
            border-radius: var(--radius-lg);
            font-family: monospace;
        }

        .drill-input:focus {
            border-color: var(--color-primary);
            outline: none;
        }

        .drill-feedback {
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            text-align: center;
            font-weight: 500;
        }

        .drill-feedback.success {
            background: var(--color-success);
            color: #2d6a2d;
        }

        .drill-feedback.error {
            background: var(--color-danger);
            color: #721c24;
        }

        .drill-progress {
            text-align: center;
        }

        .progress-label {
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
        }

        .progress-bar {
            width: 100%;
            height: 24px;
            background: var(--color-gray);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: var(--spacing-sm);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
            transition: width 0.3s ease;
        }

        .progress-text {
            color: #666;
            font-size: var(--font-size-small);
        }

        .success-message {
            text-align: center;
            padding: var(--spacing-xl);
        }

        .success-message h2 {
            color: var(--color-primary);
            margin-bottom: var(--spacing-md);
        }
    </style>
</body>
</html>
