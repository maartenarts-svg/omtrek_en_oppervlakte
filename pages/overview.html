<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Lessen - Wiskunde Leerplatform</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/duolingo-path.css">
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="header-left">
            <a href="overview.html" class="logo">📐 Wiskunde</a>
        </div>
        <div class="header-right">
            <div class="xp-display">
                <span class="xp-icon">⭐</span>
                <span class="xp-amount" id="totalXP">0</span>
                <span>XP</span>
            </div>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">?</div>
                <span class="user-name">Leerling</span>
            </div>
            <button class="btn btn-secondary btn-small" onclick="logout()">Uitloggen</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="completedLessons">0</div>
                <div class="stat-label">Lessen voltooid</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalXPStat">0</div>
                <div class="stat-label">Totaal XP</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="badgeCount">0</div>
                <div class="stat-label">Badges</div>
            </div>
        </div>

        <!-- Badges Display -->
        <div id="badgesDisplay" class="badges-container hidden">
            <!-- Badges worden hier via JS toegevoegd -->
        </div>

        <!-- Deadline Notification -->
        <div id="deadlineNotification" class="hidden">
            <!-- Wordt via JS ingevuld -->
        </div>

        <!-- Lesson Path -->
        <div class="lesson-path-container">
            <div class="lesson-path" id="lessonPath">
                <!-- Lessen worden hier via JS toegevoegd -->
            </div>
        </div>
    </main>

    <!-- Floating Action Buttons -->
    <div class="floating-buttons">
        <button class="fab fab-current" id="btnCurrentLesson" title="Ga naar huidige les">
            <span>🎯</span>
            <div class="fab-tooltip">Huidige les</div>
        </button>
        <button class="fab fab-theory" id="btnTheory" title="Theorie">
            <span>📚</span>
            <div class="fab-tooltip">Theorie</div>
        </button>
        <button class="fab fab-drill" id="btnDrill" title="Oefenen">
            <span>💪</span>
            <div class="fab-tooltip">Formules & Eenheden</div>
        </button>
    </div>

    <!-- SVG Patterns voor kleurenblindheid -->
    <svg id="svg-patterns" width="0" height="0">
        <defs>
            <pattern id="pattern-A" patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(45)">
                <rect width="20" height="20" fill="#B8E5B8"/>
                <line x1="0" y1="10" x2="20" y2="10" stroke="#D4F0D4" stroke-width="10"/>
            </pattern>
            <pattern id="pattern-B" patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(45)">
                <rect width="20" height="20" fill="#FFE5A3"/>
                <line x1="0" y1="10" x2="20" y2="10" stroke="#FFF0CC" stroke-width="10"/>
            </pattern>
            <pattern id="pattern-C" patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(45)">
                <rect width="20" height="20" fill="#FFB8A3"/>
                <line x1="0" y1="10" x2="20" y2="10" stroke="#FFD4C4" stroke-width="10"/>
            </pattern>
        </defs>
    </svg>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- App Scripts -->
    <script src="../js/firebase-config.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/progress.js"></script>
    <script src="../js/deadlines.js"></script>
    
    <script>
        // Main overview logic
        let userData = null;
        let currentUser = null;

        async function initOverview() {
            // Check auth
            currentUser = checkAuth();
            if (!currentUser) return;

            // Set user avatar
            const initials = currentUser.name.split(' ').map(n => n[0]).join('').toUpperCase();
            document.getElementById('userAvatar').textContent = initials;

            // Load user data
            userData = await DB.getUser(currentUser.email);
            if (!userData) {
                alert('Er ging iets mis bij het laden van je gegevens');
                return;
            }

            // Check weekly progress
            await checkWeeklyProgress();

            // Render everything
            renderStats();
            renderBadges();
            renderLessonPath();

            // Setup FAB buttons
            setupFABButtons();

            // Auto-scroll to current lesson
            scrollToCurrentLesson();
        }

        function renderStats() {
            // Count completed lessons
            const completed = Object.values(userData.progress || {})
                .filter(l => l.completed).length;
            
            document.getElementById('completedLessons').textContent = completed;
            document.getElementById('totalXP').textContent = userData.totalXP || 0;
            document.getElementById('totalXPStat').textContent = userData.totalXP || 0;
            
            // Badge count
            document.getElementById('badgeCount').textContent = (userData.badges || []).length;
        }

        function renderBadges() {
            const badgesDisplay = document.getElementById('badgesDisplay');
            const badges = userData.badges || [];
            
            if (badges.length === 0) {
                badgesDisplay.classList.add('hidden');
                return;
            }
            
            badgesDisplay.classList.remove('hidden');
            badgesDisplay.innerHTML = '';
            
            badges.forEach(badgeId => {
                const badgeConfig = BADGES_CONFIG[badgeId];
                if (!badgeConfig) return;
                
                const badgeEl = document.createElement('div');
                badgeEl.className = 'badge-earned';
                badgeEl.setAttribute('data-title', badgeConfig.title);
                badgeEl.innerHTML = badgeConfig.icon;
                badgesDisplay.appendChild(badgeEl);
            });
        }

        function renderLessonPath() {
            const pathContainer = document.getElementById('lessonPath');
            pathContainer.innerHTML = '';
            
            const allLessons = getAllLessons();
            const currentWeek = getCurrentWeekDeadline();
            
            console.log('Current week deadline:', currentWeek);
            console.log('Today:', new Date().toISOString().split('T')[0]);
            
            allLessons.forEach((lesson, index) => {
                const lessonProgress = userData.progress?.[lesson.id] || {};
                const parts = lesson.parts || [];
                
                const isCompleted = lessonProgress.completed || false;
                const isCurrent = userData.currentLesson === lesson.id;
                const isLocked = !isCompleted && !isCurrent;
                
                // Check for deadline AFTER this lesson
                const deadline = getDeadlineForLesson(lesson.id);
                
                console.log(`Checking lesson ${lesson.id}:`);
                console.log('  - All deadlines:', DEADLINES);
                console.log('  - Looking for targetLesson:', lesson.id);
                console.log('  - Found deadline:', deadline);
                
                const showDeadlineAfter = deadline && currentWeek && 
                    deadline.weekNumber === currentWeek.weekNumber;
                
                console.log(`  - showDeadlineAfter:`, showDeadlineAfter);
                console.log(`  - currentWeek:`, currentWeek);
                console.log('---');
                
                // Create lesson node
                const nodeEl = document.createElement('div');
                // Determine left/right position based on lesson order (1-based, odd=left, even=right)
                const positionClass = (lesson.order % 2 === 1) ? 'position-left' : 'position-right';
                nodeEl.className = `lesson-node ${positionClass}`;
                nodeEl.setAttribute('data-lesson-id', lesson.id);
                
                // Lesson circle with SVG progress
                nodeEl.innerHTML = `
                    <div class="lesson-circle ${isCompleted ? 'completed' : ''} ${isCurrent ? 'current' : ''} ${isLocked ? 'locked' : ''}"
                         onclick="${!isLocked ? `openLesson('${lesson.id}')` : ''}">
                        
                        ${!isLocked ? renderProgressRing(lessonProgress, parts) : ''}
                        
                        <div class="lesson-icon">${getLessonIcon(lesson.order)}</div>
                        <div class="lesson-number">${lesson.order}</div>
                    </div>
                    
                    <div class="lesson-info">
                        <div class="lesson-title">${lesson.title}</div>
                        ${calculateLessonXP(lessonProgress, parts) > 0 ? 
                            `<div class="lesson-xp">⭐ ${calculateLessonXP(lessonProgress, parts)} XP</div>` : ''}
                    </div>
                `;
                
                pathContainer.appendChild(nodeEl);
                
                // Add curved connector to next lesson (if not last)
                if (index < allLessons.length - 1) {
                    const n = lesson.order; // Lesson number (1-based)
                    
                    // YOUR EXACT FORMULA:
                    // Start point: (180 + 120*(-1)^n, -300*n+180)
                    const startX = 180 + 120 * Math.pow(-1, n);
                    const startY_formula = -300 * n + 180;
                    
                    // End point: (180 + 120*(-1)^(n+1), -300*n)
                    const endX = 180 + 120 * Math.pow(-1, n + 1);
                    const endY_formula = -300 * n;
                    
                    // For SVG, we need relative coordinates within this 300px segment
                    // Convert from absolute to relative (within this lesson's 300px space)
                    const relativeStartY = 120; // Bottom of circle (120px from top of container)
                    const relativeEndY = 300; // Top of next circle (300px = 180 gap + 120 height)
                    
                    // Path function: f(x) = (-1)^n / 19200 * (x - 180)³ - 300*n + 90
                    const a = Math.pow(-1, n) / 19200;
                    const b = -300 * n + 90;
                    
                    // Build path by sampling points
                    let pathD = `M ${startX} ${relativeStartY}`;
                    
                    const numPoints = 50;
                    const xStep = (endX - startX) / numPoints;
                    
                    for (let i = 1; i <= numPoints; i++) {
                        const x = startX + i * xStep;
                        const y_formula = a * Math.pow(x - 180, 3) + b;
                        // Convert absolute Y to relative Y within this 300px segment
                        const y_relative = Math.abs(y_formula) - Math.abs(startY_formula) + relativeStartY;
                        pathD += ` L ${x} ${y_relative}`;
                    }
                    
                    // Create SVG connector positioned between this lesson and next
                    const connector = document.createElement('div');
                    connector.className = `lesson-connector ${isCompleted ? 'completed' : ''}`;
                    connector.style.position = 'absolute';
                    connector.style.top = `${index * 300}px`; // Position at lesson index
                    connector.style.left = '50%';
                    connector.style.transform = 'translateX(-180px)'; // Center 360px SVG
                    connector.style.width = '360px';
                    connector.style.height = '300px'; // Height of gap + next container
                    connector.style.pointerEvents = 'none';
                    connector.style.zIndex = '0';
                    
                    connector.innerHTML = `
                        <svg viewBox="0 0 360 300" preserveAspectRatio="none" style="width:100%;height:100%;">
                            <path d="${pathD}" fill="none" stroke="${isCompleted ? '#4CAF50' : '#999'}" stroke-width="8" stroke-linecap="round"/>
                        </svg>
                    `;
                    
                    pathContainer.appendChild(connector);
                }
                
                // Add deadline marker AFTER this lesson if applicable
                if (showDeadlineAfter) {
                    console.log('ADDING DEADLINE MARKER after lesson', lesson.id);
                    const deadlineEl = document.createElement('div');
                    deadlineEl.className = 'deadline-marker-wrapper';
                    deadlineEl.innerHTML = renderDeadlineMarker(deadline, isCompleted);
                    nodeEl.appendChild(deadlineEl);
                }
            });
        }

        function renderProgressRing(lessonProgress, parts) {
            if (!parts || parts.length === 0) return '';
            
            const radius = 54;
            const circumference = 2 * Math.PI * radius;
            let currentOffset = 0;
            
            let segmentsHTML = '';
            
            parts.forEach((part, index) => {
                const partData = lessonProgress.parts?.[part.id];
                const letterScore = partData?.letterScore || null;
                const segmentLength = circumference / parts.length;
                
                if (letterScore) {
                    const scoreClass = `score-${letterScore}`;
                    segmentsHTML += `
                        <circle class="progress-segment ${scoreClass}"
                                r="${radius}"
                                cx="66"
                                cy="66"
                                stroke-dasharray="${segmentLength} ${circumference}"
                                stroke-dashoffset="${-currentOffset}"/>
                    `;
                }
                
                currentOffset += segmentLength;
            });
            
            return `
                <svg class="progress-ring" viewBox="0 0 132 132">
                    <circle class="progress-ring-bg" r="${radius}" cx="66" cy="66"/>
                    ${segmentsHTML}
                </svg>
            `;
        }

        function renderDeadlineMarker(deadline, isReached) {
            const currentWeek = getCurrentWeekDeadline();
            
            console.log('Checking deadline:', {
                deadline: deadline,
                currentWeek: currentWeek,
                isCurrentWeek: currentWeek && deadline.weekNumber === currentWeek.weekNumber
            });
            
            // Only show deadline if it's the current week
            if (!currentWeek || deadline.weekNumber !== currentWeek.weekNumber) {
                return '';
            }
            
            const daysLeft = getDaysUntilDeadline(deadline);
            const hoursLeft = getHoursUntilDeadline(deadline);
            
            let countdownText = '';
            if (daysLeft > 0) {
                countdownText = `Nog ${daysLeft}d ${hoursLeft % 24}u`;
            } else if (hoursLeft > 0) {
                countdownText = `Nog ${hoursLeft}u`;
            } else {
                countdownText = 'verstreken';
            }
            
            const markerClass = isReached ? 'reached' : (daysLeft <= 2 ? 'active' : '');
            const finishLineClass = isReached ? 'reached' : (daysLeft <= 2 ? 'active' : '');
            
            console.log('Rendering deadline marker:', { daysLeft, hoursLeft, markerClass });
            
            return `
                <div class="deadline-marker">
                    <div class="deadline-finish-line ${finishLineClass}"></div>
                    <div class="deadline-label ${markerClass}">
                        <span class="deadline-icon">🏁</span>
                        Finish deze week
                        ${!isReached ? `<span class="deadline-countdown">${countdownText}</span>` : 
                            '<span class="deadline-countdown">✓ gehaald</span>'}
                    </div>
                </div>
            `;
        }

        function getLessonIcon(order) {
            const icons = ['📏', '📐', '📊', '📈', '🔢', '📝', '🎯', '🔷', '🧮', '✨'];
            return icons[(order - 1) % icons.length] || '📚';
        }

        function calculateLessonXP(lessonProgress, parts) {
            if (!lessonProgress.parts) return 0;
            return Object.values(lessonProgress.parts)
                .reduce((sum, part) => sum + (part.xp || 0), 0);
        }

        function openLesson(lessonId) {
            window.location.href = `part.html?lesson=${lessonId}&part=${getLessonFirstPart(lessonId)}`;
        }

        function getLessonFirstPart(lessonId) {
            const lesson = getLessonById(lessonId);
            if (!lesson || !lesson.parts || lesson.parts.length === 0) return null;
            
            // Find first incomplete part, or first part if all complete
            const lessonProgress = userData.progress?.[lessonId];
            if (!lessonProgress) return lesson.parts[0].id;
            
            for (let part of lesson.parts) {
                if (!lessonProgress.parts?.[part.id]?.completed) {
                    return part.id;
                }
            }
            
            return lesson.parts[0].id;
        }

        function setupFABButtons() {
            document.getElementById('btnCurrentLesson').addEventListener('click', scrollToCurrentLesson);
            document.getElementById('btnTheory').addEventListener('click', () => {
                window.location.href = 'theory.html';
            });
            document.getElementById('btnDrill').addEventListener('click', () => {
                window.location.href = 'drill.html';
            });
        }

        function scrollToCurrentLesson() {
            const currentLessonNode = document.querySelector(`[data-lesson-id="${userData.currentLesson}"]`);
            if (currentLessonNode) {
                currentLessonNode.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        async function checkWeeklyProgress() {
            const currentWeek = getCurrentWeekDeadline();
            if (!currentWeek) return;
            
            // Check if we need to evaluate last week
            await evaluateLastWeek();
            
            // Show deadline notification if needed
            showDeadlineNotification(currentWeek);
        }

        async function evaluateLastWeek() {
            // Implementatie in deadlines.js
        }

        function showDeadlineNotification(deadline) {
            // Implementatie in deadlines.js
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initOverview);
    </script>
</body>
</html>
