<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leerplatform Wiskunde - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>📐 Wiskunde Leerplatform</h1>
                <p class="subtitle">Omtrek & Oppervlakte</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">School emailadres</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="voornaam.achternaam@labsintniklaas.be"
                        required
                        autocomplete="email">
                </div>
                
                <button type="submit" class="btn btn-primary btn-large">
                    Inloggen
                </button>
            </form>
            
            <div class="login-footer">
                <p class="help-text">
                    Problemen met inloggen? Vraag hulp aan je leerkracht.
                </p>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- App Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            // Disable button during login
            submitBtn.disabled = true;
            submitBtn.textContent = 'Bezig met inloggen...';
            
            const success = await login(email);
            
            if (!success) {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Inloggen';
            }
        });
        
        // Check if already logged in
        const currentUser = getCurrentUser();
        if (currentUser) {
            if (currentUser.isAdmin) {
                window.location.href = 'pages/dashboard.html';
            } else {
                window.location.href = 'pages/overview.html';
            }
        }
    </script>
</body>
</html>
